<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker - 项目进度跟踪</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<div class="app">
<aside class="sidebar">
<h2>Project Tracker</h2>
<nav>
<button class="nav-item active" onclick="switchPage('dashboard')">
<span class="nav-icon">&#128202;</span><span>看板</span>
</button>
<button class="nav-item" onclick="switchPage('projects')">
<span class="nav-icon">&#128196;</span><span>项目管理</span>
</button>
<button class="nav-item" onclick="switchPage('customers')">
<span class="nav-icon">&#128101;</span><span>客户管理</span>
</button>
<button class="nav-item" onclick="switchPage('prices')">
<span class="nav-icon">&#128176;</span><span>价格参考</span>
</button>
<button class="nav-item" onclick="switchPage('import')">
<span class="nav-icon">&#128229;</span><span>导入报价</span>
</button>
</nav>
</aside>

<main class="main">
<!-- ── Dashboard ── -->
<div id="page-dashboard" class="page active">
<div class="card-header"><h3>业务看板</h3>
<div class="btn-group">
<button class="btn active" onclick="loadDashboard('month')">按月</button>
<button class="btn" onclick="loadDashboard('quarter')">按季度</button>
<button class="btn" onclick="loadDashboard('year')">按年</button>
</div></div>
<div id="dashboard-summary" class="stats-grid"></div>
<div class="card"><div class="chart-container"><canvas id="chartLanding" role="img" aria-label="项目落地统计"></canvas></div></div>
<div class="card"><div class="chart-container"><canvas id="chartAmount" role="img" aria-label="项目金额与毛利统计"></canvas></div></div>
</div>

<!-- ── Projects ── -->
<div id="page-projects" class="page">
<div class="card-header"><h3>项目管理</h3>
<div class="btn-group">
<input class="form-control" id="projSearch" placeholder="搜索项目..." oninput="loadProjects()" style="max-width:200px">
<button class="btn btn-primary" onclick="showProjectModal()">+ 新建项目</button>
</div></div>
<div class="table-wrap"><table id="projTable"><thead><tr>
<th>项目名称</th><th>客户</th><th>报价日期</th><th>出街价格</th><th>毛利</th><th>状态</th><th>操作</th>
</tr></thead><tbody></tbody></table></div>
</div>

<!-- ── Customers ── -->
<div id="page-customers" class="page">
<div class="card-header"><h3>客户管理</h3>
<div class="btn-group">
<input class="form-control" id="custSearch" placeholder="搜索客户..." oninput="loadCustomers()" style="max-width:200px">
<button class="btn btn-primary" onclick="showCustomerModal()">+ 新增客户</button>
</div></div>
<div class="table-wrap"><table id="custTable"><thead><tr>
<th>公司名称</th><th>联系人</th><th>电话</th><th>邮箱</th><th>地址</th><th>关联项目</th><th>操作</th>
</tr></thead><tbody></tbody></table></div>
</div>

<!-- ── Price References ── -->
<div id="page-prices" class="page">
<div class="card-header"><h3>价格参考 - 历史报价归类统计</h3>
<div class="btn-group">
<input class="form-control" id="priceSearch" placeholder="搜索产品/服务..." oninput="loadPriceRefs()" style="max-width:200px">
<select class="form-control" id="priceCatFilter" onchange="loadPriceRefs()" style="max-width:160px">
<option value="">全部类别</option>
</select>
<button class="btn btn-primary" onclick="refreshPriceRefs()">刷新统计</button>
</div></div>
<div class="btn-group" style="margin-bottom:10px">
<button class="btn btn-sm" onclick="toggleAllPriceRefs(this)">全选</button>
<button class="btn btn-sm btn-danger" onclick="batchDeletePriceRefs()">删除选中</button>
</div>
<div class="table-wrap"><table id="priceTable"><thead><tr>
<th style="width:30px"><input type="checkbox" onchange="toggleAllPriceRefs(this)" style="cursor:pointer"></th>
<th>类别</th><th>产品/服务名称</th><th>设备型号</th><th>均价</th><th>最低价</th><th>最高价</th><th>币种</th><th>报价次数</th><th>供应商</th><th style="width:50px">操作</th>
</tr></thead><tbody></tbody></table></div>
</div>

<!-- ── Import ── -->
<div id="page-import" class="page">
<div class="card-header"><h3>导入供应商报价</h3></div>
<div class="card">
<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap">
<div class="form-group" style="margin-bottom:0;flex:1;min-width:200px"><label>关联项目（可选）</label>
<select class="form-control" id="importProjectId" style="max-width:300px"><option value="">不关联（仅入库）</option></select></div>
<a href="/api/import/template" class="btn" style="text-decoration:none;color:var(--primary);border-color:var(--primary)">下载导入模板</a>
</div>
<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<div class="drop-zone-text">
<strong>点击选择文件</strong> 或将文件拖拽到此区域<br>
支持 .xlsx / .xls / .pdf / .csv 格式<br>
<small style="color:var(--text-secondary)">推荐先下载模板填写后上传，保证格式准确</small>
</div>
</div>
<input type="file" id="fileInput" accept=".xlsx,.xls,.pdf,.csv" style="display:none" onchange="handleFileUpload(this.files)">
<div id="importResult"></div>
</div>
</div>
</main>
</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal modal-lg" id="modalContent"></div>
</div>

<div id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
